    <script type="text/babel" data-type="module">

        // Formateador de moneda: Ahora muestra en Millones de Pesos (MM$)
        const formatMoney = (v) => {
            if (!v) return 'MM$ 0';
            // Como los datos base están en miles de pesos, dividimos por 1000 para llegar a millones
            const millones = v / 1000; 
            return `MM$ ${new Intl.NumberFormat('es-CL', { minimumFractionDigits: 0, maximumFractionDigits: 1 }).format(millones)}`;
        };

        // Parseador robusto para convertir formatos de Excel (texto, puntos, comas) a números matemáticos
        const parseMoney = (val) => {
            if (val === null || val === undefined || val === '') return 0;
            if (typeof val === 'number') return val;
            let str = String(val).trim();
            str = str.replace(/[\$\s]/g, ''); // Quitar signos $ y espacios
            
            const dotCount = (str.match(/\./g) || []).length;
            const commaCount = (str.match(/,/g) || []).length;
            
            if (commaCount === 1 && dotCount > 0) {
                // Formato chileno: 1.000.000,50
                str = str.replace(/\./g, '').replace(',', '.');
            } else if (dotCount === 1 && commaCount > 0) {
                // Formato US: 1,000,000.50
                str = str.replace(/,/g, '');
            } else if (dotCount > 1) {
                // Ejemplo: 1.000.000 -> son separadores de miles
                str = str.replace(/\./g, '');
            } else if (commaCount > 1) {
                // Ejemplo: 1,000,000 -> son separadores de miles
                str = str.replace(/,/g, '');
            } else if (commaCount === 1 && dotCount === 0) {
                // Ejemplo: 1000,50 -> la coma es decimal en Chile
                str = str.replace(',', '.');
            }
            // Si dotCount === 1 && commaCount === 0 (Ej: "67258.013")
            // Se trata como un float normal ya que Power Automate envía los decimales con punto.
            
            return parseFloat(str) || 0;
        };

        const MultiSelect = ({ options, selected, onChange, label, icon: Icon }) => {
            const [isOpen, setIsOpen] = useState(false);
            const containerRef = useRef(null);

                const handleClickOutside = (e) => { if (containerRef.current && !containerRef.current.contains(e.target)) setIsOpen(false); };

            const isAllSelected = selected.length === options.length && options.length > 0;
            const toggleOption = (opt) => selected.includes(opt) ? onChange(selected.filter(i => i !== opt)) : onChange([...selected, opt]);
            
            const getSummary = () => {

                            <div className="sticky top-0 bg-slate-50/95 backdrop-blur-md border-b border-slate-100 p-2 cursor-pointer hover:bg-slate-100 transition-colors z-10" onClick={() => isAllSelected ? onChange([]) : onChange([...options])}>
                                <div className="flex items-center gap-3 px-2 py-1"><div className={`w-4 h-4 rounded border flex items-center justify-center transition-all duration-200 ${isAllSelected ? 'bg-indigo-600 border-indigo-600 shadow-sm' : 'bg-white border-slate-300'}`}>{isAllSelected && <Check size={12} className="text-white" strokeWidth={3} />}</div><span className="text-sm font-bold text-indigo-900">Seleccionar Todo</span></div>
                            </div>
                            <div className="p-1.5">{options.map(opt => (<div key={opt} className="flex items-center gap-3 px-3 py-2 rounded-lg cursor-pointer hover:bg-indigo-50 transition-colors" onClick={() => toggleOption(opt)}><div className={`w-4 h-4 rounded border flex items-center justify-center transition-all duration-200 ${selected.includes(opt) ? 'bg-indigo-500 border-indigo-500 shadow-sm' : 'bg-white border-slate-300'}`}>{selected.includes(opt) && <Check size={10} className="text-white" strokeWidth={3} />}</div><span className={`text-sm ${selected.includes(opt) ? 'text-indigo-900 font-medium' : 'text-slate-600'}`}>{opt}</span></div>))}</div>
                        </div>
                    )}

            );
        };

        // --- COMPONENTE: PORTADA ---
        const LandingPage = ({ onEnter }) => {
            return (

                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden z-0">

                        <div className="absolute top-1/3 right-1/4 w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-blob animation-delay-2000"></div>
                        <div className="absolute -bottom-32 left-1/2 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-blob animation-delay-4000"></div>

                    <div className="relative z-10 text-center px-4 max-w-4xl mx-auto">
                        <div className="mb-8 inline-flex p-6 bg-white rounded-3xl shadow-2xl shadow-indigo-500/20 animate-fade-in">

        // ==========================================
        // COMPONENTE: DASHBOARD
        // ==========================================
        const Dashboard = ({ onBack }) => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState('');
            const [isLive, setIsLive] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [loadProgress, setLoadProgress] = useState('');
            
            // Filtros
            const [selectedTipos, setSelectedTipos] = useState([]);
            const [selectedEstados, setSelectedEstados] = useState([]);
            const [selectedServicios, setSelectedServicios] = useState([]);
            const [selectedTrimestres, setSelectedTrimestres] = useState([]);
            const [selectedCentros, setSelectedCentros] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [periodoActual, setPeriodoActual] = useState('');
            
            // Estado para el filtro cruzado de la tabla
            const [selectedProject, setSelectedProject] = useState(null);

            // Paginación UI
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 8; 

            // =======================================================
            // LÓGICA DE EXTRACCIÓN Y PAGINACIÓN DE LA API (POWER AUTOMATE)
            // =======================================================
            useEffect(() => {
                const fetchAllData = async () => {
                    setLoading(true);
                    setErrorMsg('');
                    setLoadProgress('Conectando a base de datos MOP...');
                    
                    let allRecords = [];
                    let offset = 0;
                    let hasMoreData = true;

                    // Función auxiliar para buscar el valor real del diccionario 
                    // (Considerando sufijos _x002e_1 por problemas de Excel)
                    const getVal = (obj, keys) => {
                        for(let k of keys) {
                            if(obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k];
                        }
                        return null;
                    };

                    // Función de parseo de fechas movida aquí arriba para usarla en la limpieza fila a fila
                    const parseDateToTimestamp = (str) => {
                        if (!str || str === "Sin Fecha" || str === "Por Definir") return 0;
                        
                        // 1. Formato Número de Serie de Excel
                        if (!isNaN(str) && Number(str) > 20000) return Math.round((Number(str) - 25569) * 86400000);
                        
                        let cleanStr = String(str).toLowerCase().trim();
                        
                        // 2. Formato DD-MM-YYYY o DD/MM/YYYY
                        const dateMatch = cleanStr.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
                        if (dateMatch) return Date.UTC(parseInt(dateMatch[3]), parseInt(dateMatch[2]) - 1, parseInt(dateMatch[1]));

                        // 3. Formato YYYY-MM-DD o YYYY/MM/DD
                        const dateMatchRev = cleanStr.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
                        if (dateMatchRev) return Date.UTC(parseInt(dateMatchRev[1]), parseInt(dateMatchRev[2]) - 1, parseInt(dateMatchRev[3]));

                        // 4. Formato Texto (ej: "enero 2026")
                        const months = {'ene': 0, 'feb': 1, 'mar': 2, 'abr': 3, 'may': 4, 'jun': 5, 'jul': 6, 'ago': 7, 'sep': 8, 'oct': 9, 'nov': 10, 'dic': 11};
                        let monthFound = -1;
                        let yearFound = new Date().getFullYear();
                        
                        for (const [m, val] of Object.entries(months)) {
                            if (cleanStr.includes(m)) { monthFound = val; break; }
                        }
                        const yearMatch = cleanStr.match(/\d{4}/);
                        if (yearMatch) yearFound = parseInt(yearMatch[0]);
                        
                        if (monthFound !== -1) return Date.UTC(yearFound, monthFound, 1);
                        
                        // 5. Fallback estándar de Javascript
                        const d = new Date(str);
                        if (!isNaN(d.getTime())) return d.getTime();
                        return 0;
                    };

                    try {
                        while (hasMoreData) {
                            setLoadProgress(`Descargando registros... (${allRecords.length} obtenidos)`);
                            
                            const response = await fetch(`${API_BASE_URL}&saltar=${offset}`, {
                                method: 'GET',
                                headers: { 'Accept': 'application/json' }
                            });

                            if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                            
                            // Se lee la respuesta como texto primero para manejar respuestas vacías o no-JSON
                            const textData = await response.text();
                            
                            if (!textData || textData.trim() === '') {
                                // Power Automate puede devolver una cadena vacía cuando ya no hay más datos
                                hasMoreData = false;
                                break;
                            }

                            let json;
                            try {
                                json = JSON.parse(textData);
                            } catch (parseError) {
                                console.warn("JSON inválido recibido, asumiendo fin de datos.", parseError);
                                hasMoreData = false;
                                break;
                            }

                            // Extraer items considerando diferentes estructuras posibles que devuelve Power Automate
                            let items = [];
                            if (Array.isArray(json)) {
                                items = json;
                            } else if (json && Array.isArray(json.value)) {
                                items = json.value;
                            } else if (json && Array.isArray(json.body)) {
                                items = json.body;
                            } else if (json && typeof json === 'object') {
                                const possibleArray = Object.values(json).find(val => Array.isArray(val));
                                if (possibleArray) items = possibleArray;
                            }
                            
                            if (items.length === 0) {
                                hasMoreData = false; // Fin de la paginación
                            } else {
                                // Procesar el bloque de datos actual
                                const processedBlock = items.map((d, index) => {
                                    
                                    // 1. Nombre
                                    const nombre = getVal(d, ["Nombre Contrato", "Nombre Contrato_x002e_1", "Nombre IDI"]) || `Sin Nombre (ID: ${d.ItemInternalId || index})`;
                                    
                                    // 2. Clasificación/Tipo
                                    const tipoRaw = getVal(d, ["Item", "Clasificacion", "Etapa", "Tipo Contratación"]);
                                    let tipo = "Otro";
                                    if(tipoRaw) {
                                        const str = String(tipoRaw).toUpperCase();
                                        if(str.includes('OBRA') || str.includes('PROYECTO')) tipo = 'Obra';
                                        else if(str.includes('ESTUDIO') || str.includes('DISEÑO')) tipo = 'Estudio';
                                        else if(str.includes('ASESORIA') || str.includes('CONSULTORIA')) tipo = 'Asesoría';
                                        else tipo = String(tipoRaw);
                                    }

                                    // 3. Ubicación
                                    const provincia = getVal(d, ["Provincia", "Provincia Contrato"]) || "Regional";
                                    const comuna = getVal(d, ["Comuna", "Comuna Contrato"]) || "Varias";
                                    
                                    // 4. Servicio / Dirección
                                    const servicio = getVal(d, ["Servicio", "Servicio_x002e_1"]) || "MOP Nivel Central";
                                    
                                    // 5. Estado (Se mantiene para filtros aunque no se muestre en tabla)
                                    const estado = getVal(d, ["Estado", "Estado_x002e_1"]) || "No Definido";
                                    
                                    // Extraer Trimestre y Mes Entrega DIRPLAN primero para la regla de negocio
                                    const trimestreMovil = getVal(d, ["trimestre movil", "trimestre movil_x002e_1", "mes", "mes_x002e_1"]) || "Sin Trimestre";
                                    const mesEntrega = getVal(d, ["mes entrega DIRPLAN", "mes entrega DIRPLAN_x002e_1"]) || "Sin Fecha";
                                    const mesEntregaTs = parseDateToTimestamp(mesEntrega);

                                    // 6. Fechas (Convertir y aplicar REGLA DE NEGOCIO DIRPLAN)
                                    let fechaRaw = getVal(d, ["Mes Licitación", "Mes Licitación_x002e_1", "F Licitación", "F Licitación_x002e_1"]);
                                    let fechaLicitacion = "Por Definir";
                                    let fechaLicitacionTs = 0;

                                    if(fechaRaw) {
                                        fechaLicitacionTs = parseDateToTimestamp(fechaRaw);
                                        if (fechaLicitacionTs > 0) {
                                            const excelDate = new Date(fechaLicitacionTs);
                                            fechaLicitacion = excelDate.toLocaleDateString('es-CL', { timeZone: 'UTC', month: 'short', year: 'numeric' });
                                        } else {
                                            fechaLicitacion = String(fechaRaw);
                                        }
                                    }

                                    // REGLA: Si la fecha de Licitación es estrictamente menor a la fecha DIRPLAN, se oculta.
                                    if (fechaLicitacionTs > 0 && mesEntregaTs > 0 && fechaLicitacionTs < mesEntregaTs) {
                                        fechaLicitacion = "Por Definir";
                                    }

                                    // 6.1 Fechas de Inicio y Término
                                    let fInicioRaw = getVal(d, ["F Inicio", "F Inicio_x002e_1"]);
                                    let fInicio = "-";
                                    if(fInicioRaw) {
                                        let ts = parseDateToTimestamp(fInicioRaw);
                                        if(ts > 0) fInicio = new Date(ts).toLocaleDateString('es-CL', { timeZone: 'UTC', day: '2-digit', month: '2-digit', year: 'numeric' });
                                        else fInicio = String(fInicioRaw);
                                    }

                                    let fTerminoRaw = getVal(d, ["F Término", "F Término_x002e_1"]);
                                    let fTermino = "-";
                                    if(fTerminoRaw) {
                                        let ts = parseDateToTimestamp(fTerminoRaw);
                                        if(ts > 0) fTermino = new Date(ts).toLocaleDateString('es-CL', { timeZone: 'UTC', day: '2-digit', month: '2-digit', year: 'numeric' });
                                        else fTermino = String(fTerminoRaw);
                                    }

                                    // 7. Finanzas (Prioridad estricta: Programado año -> Programado + pagado año -> 0)
                                    let presupuesto = 0;
                                    const pAno = getVal(d, ["Programado año", "Programado año_x002e_1"]);
                                    const pPagado = getVal(d, ["Programado + pagado año", "Programado + pagado año_x002e_1"]);
                                    
                                    if (pAno !== null && pAno !== undefined && String(pAno).trim() !== "") {
                                        presupuesto = parseMoney(pAno);
                                    } else if (pPagado !== null && pPagado !== undefined && String(pPagado).trim() !== "") {
                                        presupuesto = parseMoney(pPagado);
                                    }

                                    // 7.1 Monto Vigente Contrato
                                    let montoVigente = 0;
                                    const mVigente = getVal(d, ["Monto Vigente Contrato", "Monto Vigente Contrato_x002e_1"]);
                                    if (mVigente !== null && mVigente !== undefined && String(mVigente).trim() !== "") {
                                        montoVigente = parseMoney(mVigente);
                                    }

                                    // 9. Centro Gestión
                                    const centroGestion = getVal(d, ["Centro Gestión", "Centro gestión_x002e_1", "Centro gestión.1"]) || "Sin Centro";

                                    return { 
                                        id: d.ItemInternalId || (offset + index), 
                                        nombre, tipo, provincia, comuna, estado, servicio, presupuesto, montoVigente, fechaLicitacion, fInicio, fTermino, trimestreMovil, mesEntrega, centroGestion
                                    };
                                });

                                allRecords = allRecords.concat(processedBlock);
                                offset += 5000;
                                
                                // Si trajo menos de 5000, es la última página
                                if (items.length < 5000) hasMoreData = false;
                            }
                        }

                        if (allRecords.length > 0) {
                            let maxTimestamp = -1;
                            let latestMesEntrega = null;
                            
                            allRecords.forEach(r => {
                                const ts = parseDateToTimestamp(r.mesEntrega);
                                if (ts > maxTimestamp) {
                                    maxTimestamp = ts;
                                    latestMesEntrega = r.mesEntrega;
                                }
                            });

                            // Filtrar globalmente por el último periodo
                            const finalRecords = latestMesEntrega && latestMesEntrega !== "Sin Fecha" 
                                ? allRecords.filter(r => r.mesEntrega === latestMesEntrega) 
                                : allRecords;

                            // Formatear periodo para mostrar en la interfaz limpiamente (Ej: "enero de 2026")
                            let periodoDisplay = latestMesEntrega || "Actualizado";
                            if (latestMesEntrega && latestMesEntrega !== "Sin Fecha") {
                                const ts = parseDateToTimestamp(latestMesEntrega);
                                if (ts > 0) {
                                    periodoDisplay = new Date(ts).toLocaleDateString('es-CL', { timeZone: 'UTC', month: 'long', year: 'numeric' });
                                }
                            }

                            setData(finalRecords);
                            setPeriodoActual(periodoDisplay);
                            setIsLive(true);
                        } else {
                            setData([]);
                            setIsLive(true);
                            setErrorMsg("La conexión fue exitosa, pero la base de datos no retornó ningún registro.");
                        }

                    } catch (err) {
                        console.error("Error en extracción:", err);
                        setErrorMsg(err.message);
                        setIsLive(false);
                    } finally {
                        setLoading(false);
                    }
                };

                fetchAllData();
            }, []);

            // Resetear página y selección de tabla al aplicar filtros laterales
            useEffect(() => { 
                setCurrentPage(1); 
                setSelectedProject(null);
            }, [selectedTipos, selectedEstados, selectedServicios, selectedTrimestres, selectedCentros, searchTerm]);

            // Función de filtrado multidimensional
            const getFilteredData = (ignoreFilter) => {
                return data.filter(d => {
                    if (ignoreFilter !== 'tipo' && selectedTipos.length > 0 && !selectedTipos.includes(d.tipo)) return false;
                    if (ignoreFilter !== 'estado' && selectedEstados.length > 0 && !selectedEstados.includes(d.estado)) return false;
                    if (ignoreFilter !== 'servicio' && selectedServicios.length > 0 && !selectedServicios.includes(d.servicio)) return false;
                    if (ignoreFilter !== 'trimestre' && selectedTrimestres.length > 0 && !selectedTrimestres.includes(d.trimestreMovil)) return false;
                    if (ignoreFilter !== 'centro' && selectedCentros.length > 0 && !selectedCentros.includes(d.centroGestion)) return false;
                    
                    if (searchTerm) {
                        const s = searchTerm.toLowerCase();
                        if (!d.nombre.toLowerCase().includes(s) && !d.comuna.toLowerCase().includes(s) && !d.servicio.toLowerCase().includes(s)) return false;
                    }
                    return true;
                });
            };

            // Opciones dinámicas para los filtros (se actualizan según lo que está filtrado)
            const tipos = useMemo(() => { const sub = getFilteredData('tipo'); return [...new Set(sub.map(d => d.tipo))].sort(); }, [data, selectedEstados, selectedServicios, selectedTrimestres, selectedCentros, searchTerm]);
            const estados = useMemo(() => { const sub = getFilteredData('estado'); return [...new Set(sub.map(d => d.estado))].sort(); }, [data, selectedTipos, selectedServicios, selectedTrimestres, selectedCentros, searchTerm]);
            const servicios = useMemo(() => { const sub = getFilteredData('servicio'); return [...new Set(sub.map(d => d.servicio))].sort(); }, [data, selectedTipos, selectedEstados, selectedTrimestres, selectedCentros, searchTerm]);
            const trimestres = useMemo(() => { const sub = getFilteredData('trimestre'); return [...new Set(sub.map(d => d.trimestreMovil))].sort(); }, [data, selectedTipos, selectedEstados, selectedServicios, selectedCentros, searchTerm]);
            const centros = useMemo(() => { const sub = getFilteredData('centro'); return [...new Set(sub.map(d => d.centroGestion))].sort(); }, [data, selectedTipos, selectedEstados, selectedServicios, selectedTrimestres, searchTerm]);
            
            // Datos filtrados finales para la tabla y gráficos
            const filtered = useMemo(() => getFilteredData('none'), [data, selectedTipos, selectedEstados, selectedServicios, selectedTrimestres, selectedCentros, searchTerm]);

            // Datos activos para KPIs y Gráficos (Cross-Filter de la tabla)
            const activeData = useMemo(() => {

            const kpiPresupuesto = activeData.reduce((acc, curr) => acc + curr.presupuesto, 0);
            const kpiMontoVigente = activeData.reduce((acc, curr) => acc + curr.montoVigente, 0);
            const countObras = activeData.filter(d => d.tipo === 'Obra' || d.tipo.toLowerCase().includes('obra')).length;

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col h-full overflow-hidden relative bg-slate-50/50">
                        {/* Header */}
                        <header className="bg-white/80 backdrop-blur-md border-b border-slate-200/80 flex flex-col md:flex-row items-start md:items-center justify-between px-4 md:px-6 py-3 md:py-4 z-20 sticky top-0 gap-3 md:gap-0">

                                <div className="flex items-center gap-3">
                                    <button onClick={() => setSidebarOpen(true)} className="p-2 -ml-2 rounded-xl hover:bg-slate-100 text-slate-600 md:hidden transition-colors"><Menu size={24} /></button>
                                    <div>
                                        <h2 className="font-bold text-slate-800 text-lg md:text-xl tracking-tight">Cartera MOP</h2>
                                        <p className="text-xs text-slate-500 hidden sm:block">Región del Maule • Chile</p>
                                    </div>
                                </div>
                                <div className={`flex md:hidden items-center px-2 py-1 rounded-md border ${isLive ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-red-50 text-red-600 border-red-100'}`}>
                                    <span className="text-[9px] font-bold uppercase tracking-wider flex items-center gap-1"><Wifi size={10} /> {isLive ? 'En Vivo' : 'Error'}</span>

                                                                <span className="text-slate-600 text-xs font-medium">{d.fInicio}</span>
                                                            </td>
                                                            <td className="px-3 py-3 text-center align-middle">
                                                                <span className="text-slate-600 text-xs font-medium">{d.fTermino}</span>
                                                            </td>
                                                            <td className="px-3 py-3 text-center align-middle">
                                                                <span className="text-slate-500 text-xs font-medium bg-slate-50 px-2 py-1 rounded border border-slate-100 block mb-1">{d.fechaLicitacion}</span>
                                                                <span className="text-[9px] text-indigo-400 uppercase font-semibold">{d.trimestreMovil}</span>
                                                            </td>
                                                            <td className="px-3 py-3 text-right pr-6 align-middle">
                                                                <span className="font-mono text-indigo-700 font-bold bg-indigo-50/50 px-2 py-1 rounded border border-indigo-100 whitespace-nowrap text-xs">
                                                                    {formatMoney(d.presupuesto)}
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    )) : (
                                                        <tr>
                                                            <td colSpan="6" className="py-8 text-center text-slate-400 text-sm">No se encontraron contratos con los filtros actuales.</td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                        {/* Pagination Controls */}
                                        {filtered.length > itemsPerPage && (
                                            <div className="p-3 md:p-4 border-t border-slate-100 bg-slate-50/50 flex flex-col sm:flex-row gap-4 justify-between items-center">
                                                <button onClick={handlePrevPage} disabled={currentPage === 1} className={`w-full sm:w-auto justify-center flex items-center gap-2 px-4 py-2 sm:py-1.5 rounded-xl text-sm font-medium transition-all border ${currentPage === 1 ? 'text-slate-300 border-transparent cursor-not-allowed' : 'text-slate-600 bg-white border-slate-200 hover:border-indigo-300 hover:text-indigo-600 hover:shadow-md'}`}><ChevronLeft size={16} /> Anterior</button>
                                                <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider order-first sm:order-none mb-1 sm:mb-0">Página <span className="text-slate-800 text-sm">{currentPage}</span> de {totalPages}</span>
                                                <button onClick={handleNextPage} disabled={currentPage === totalPages} className={`w-full sm:w-auto justify-center flex items-center gap-2 px-4 py-2 sm:py-1.5 rounded-xl text-sm font-medium transition-all border ${currentPage === totalPages ? 'text-slate-300 border-transparent cursor-not-allowed' : 'text-slate-600 bg-white border-slate-200 hover:border-indigo-300 hover:text-indigo-600 hover:shadow-md'}`}>Siguiente <ChevronRight size={16} /></button>
                                            </div>
                                        )}
                                    </div>
                                </>
                            )}
                            <div className="h-8"></div>
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('landing');
            return (
                <>
                    {view === 'landing' ? (
                        <LandingPage onEnter={() => setView('dashboard')} />
                    ) : (
                        <Dashboard onBack={() => setView('landing')} />
                    )}
                </>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
